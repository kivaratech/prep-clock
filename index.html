<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shelf Life Timer Board</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-info">
          <h1>Shelf Life Timers</h1>
          <p>Tap a timer to start • Turns red at 15 min</p>
        </div>
        <button id="admin-toggle" aria-label="Settings">⚙️</button>
      </header>
      
      <main id="timer-grid" class="grid"></main>

      <div id="admin-screen" class="hidden">
        <div class="admin-content">
          <header>
            <h2>Settings</h2>
            <button id="admin-close">Close</button>
          </header>
          
          <section class="global-settings">
            <label>
              Warning Threshold (min):
              <input type="number" id="warning-threshold" min="1" />
            </label>
          </section>

          <section class="item-editor">
            <h3>Add/Edit Item</h3>
            <form id="item-form">
              <input type="hidden" id="edit-id" />
              <div class="form-group">
                <input type="text" id="item-name" placeholder="Item Name" required />
              </div>
              <div class="form-group">
                <input type="number" id="item-duration" placeholder="Minutes" required />
              </div>
              <div class="form-group">
                <label class="form-group-checkbox">
                  <input type="checkbox" id="item-side2" />
                  Enable Side 2
                </label>
              </div>
              <button type="submit">Save Item</button>
            </form>
          </section>

          <section class="item-list">
            <h3>Current Items</h3>
            <ul id="items-ul"></ul>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
