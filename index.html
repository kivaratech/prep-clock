<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Prep Clock</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-info">
          <h1>Prep Clock</h1>
          <p>Tap a timer to start • Turns red at 5 min</p>
        </div>
        <div class="header-clock">
          <span id="clock-time"></span>
        </div>
        <button id="admin-toggle" aria-label="Settings">⚙️</button>
      </header>
      
      <main id="timer-grid" class="grid"></main>

      <div id="admin-screen" class="hidden">
        <div class="admin-content">
          <header>
            <h2>Settings</h2>
            <button id="admin-close">Close</button>
          </header>

          <section class="bulk-actions-section">
            <h3>Bulk Actions</h3>
            <div class="bulk-actions">
              <button id="btn-bulk-side2-on" class="btn-secondary">Enable All Side 2</button>
              <button id="btn-bulk-side2-off" class="btn-secondary">Disable All Side 2</button>
            </div>
            <div class="bulk-actions">
              <button id="btn-bulk-start" class="btn-secondary btn-success">Start All Timers</button>
              <button id="btn-bulk-reset" class="btn-secondary btn-danger">Reset All Timers</button>
            </div>
          </section>

          <section class="item-editor">
            <h3>Add/Edit Item</h3>
            <form id="item-form">
              <input type="hidden" id="edit-id" />
              <input type="text" id="item-name" placeholder="Item Name" required />
              <div class="duration-inputs">
                <div class="input-group">
                  <label>Hr</label>
                  <input type="number" id="item-hours" min="0" value="0" />
                </div>
                <div class="input-group">
                  <label>Min</label>
                  <input type="number" id="item-minutes" min="0" value="0" required />
                </div>
              </div>
              <select id="item-category" required></select>
              <label class="checkbox-label" id="side2-option-wrapper">
                <input type="checkbox" id="item-has-side2" /> Enable Side 2
              </label>
              <p id="duration-error" class="form-error hidden">Duration must be greater than 0.</p>
              <p id="timer-added" class="form-success hidden">Timer added!</p>
              <button type="submit">Save Item</button>
            </form>
          </section>

          <section class="alert-settings">
            <h3>Default Alert</h3>
            <div class="settings-row">
              <label for="default-alert-select">Alert Sound</label>
              <select id="default-alert-select">
                <option value="alert1">Alert 1</option>
                <option value="alert2">Alert 2</option>
                <option value="alert3">Alert 3</option>
              </select>
              <button id="test-alert-btn" class="btn-secondary" style="margin-top: 8px;">Test Alert</button>
            </div>
          </section>
          
          <section class="theme-settings">
            <h3>Appearance</h3>
            <div class="settings-row">
              <label>Theme</label>
              <select id="theme-select">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
              </select>
            </div>
          </section>

          <section class="item-list">
            <h3>Current Items</h3>
            <ul id="items-ul"></ul>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
